services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=loan_db'
      - 'POSTGRES_PASSWORD=password123'
      - 'POSTGRES_USER=db_user'
    ports:
      - '5433:5432'
    volumes:
      - './src/main/resources/db/changelog:/db/changelog'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U db_user -d loan_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  inbank-loan-engine:
    build: .
    container_name: inbank-loan-engine
    ports:
      - '8080:8080'
    volumes:
      - './src/main/resources/application.properties:/app/application.properties:ro'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: frontend
    working_dir: /app
    volumes:
      - "../frontend:/app"
      - "/app/node_modules"
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - inbank-loan-engine
    profiles: ['dev']

  nginx-dev:
    image: 'nginx:latest'
    container_name: nginx-dev
    ports:
      - '80:80'
    volumes:
      - './nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro'
    depends_on:
      - frontend-dev
      - inbank-loan-engine
    profiles: ['dev']
    restart: always

  nginx-prod:
    container_name: nginx-prod
    build:
      context: '../frontend'
      dockerfile: Dockerfile
    ports:
      - '80:80'
    volumes:
      - './nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro'
    depends_on:
       - inbank-loan-engine
    profiles: [ 'prod' ]
    restart: always
