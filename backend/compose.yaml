services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=loan_db'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
      - 'POSTGRES_USER=${POSTGRES_USER}'
    ports:
      - '5433:5432'
    volumes:
      - '/srv/postgres/inbank_loan_engine:/var/lib/postgresql'
      - './src/main/resources/db/changelog:/db/changelog'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d loan_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  inbank_loan_engine:
    build: .
    container_name: inbank_loan_engine
    #    restart: always
    ports:
      - '8080:8080'
    environment:
      - 'SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USER}'
      - 'SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}'
    depends_on:
      postgres:
        condition: service_healthy
